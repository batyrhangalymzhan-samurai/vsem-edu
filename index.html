<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ВСЕМ ЕДУ — вкусная еда с быстрой доставкой на дом. Пицца, суши, фаст-фуд и многое другое.">
  <title>ВСЕМ ЕДУ — Доставка еды</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header__inner container">
      <a href="#" class="header__logo" aria-label="ВСЕМ ЕДУ — Главная">
        <img src="" alt="ВСЕМ ЕДУ логотип" class="header__logo-img" id="headerLogo">
      </a>

      <nav class="header__nav" aria-label="Навигация по сайту">
        <a href="#menu" class="header__nav-link header__nav-link--active" data-section="menu">Меню</a>
        <a href="#reviews" class="header__nav-link" data-section="reviews">Отзывы</a>
      </nav>

      <div class="header__info">
        <span class="header__info-item">
          <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="hoursText"></span>
        </span>
        <span class="header__info-item">
          <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="1" y="3" width="15" height="13"/>
            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
          доставка от <strong id="deliveryText"></strong>
        </span>
      </div>

      <a href="tel:" class="header__phone btn btn--outline" id="headerPhoneLink" aria-label="Телефон">
        <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span id="headerPhoneText"></span>
      </a>
    </div>
  </header>

  <main>

    <!-- Hero -->
    <section class="hero" id="hero">
      <div class="hero__inner container">
        <div class="hero__content">
          <h1 class="hero__title" id="heroTitle"></h1>
          <p class="hero__subtitle" id="heroSubtitle"></p>
          <a href="#menu" class="hero__btn btn btn--primary" id="heroBtn"></a>
        </div>
        <div class="hero__visual">
          <div class="hero__image-wrap">
            <img src="" alt="Вкусная еда от ВСЕМ ЕДУ" class="hero__image" id="heroImage">
          </div>
        </div>
      </div>
    </section>

    <!-- Menu -->
    <section class="menu" id="menu">
      <div class="container">
        <h2 class="section-title" id="menuTitle">Меню</h2>
        <p class="section-subtitle" id="menuSubtitle">Выберите категорию и просмотрите блюда</p>

        <div class="menu__tabs-wrapper">
          <div class="menu__tabs" role="tablist" aria-label="Категории меню" id="menuTabs">
            <!-- Generated by script.js -->
          </div>
        </div>

        <div class="menu__panels" id="menuPanels">
          <!-- Generated by script.js -->
        </div>
      </div>
    </section>

    <!-- Reviews -->
    <section class="reviews" id="reviews">
      <div class="container">
        <h2 class="section-title" id="reviewsTitle">Instagram</h2>
        <div style="text-align: center; margin-top: 15px; margin-bottom: 25px;">
          <a href="" target="_blank" id="reviewsInstagramBtn" style="display: inline-block; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #ffffff; padding: 12px 24px; border-radius: 25px; text-decoration: none; font-weight: bold; font-family: sans-serif; font-size: 15px;">
            <i class="fab fa-instagram"></i> <span id="reviewsInstagramBtnText">подробнее в инсте</span>
          </a>
        </div>
        <p class="section-subtitle" id="reviewsSubtitle">Реальные отзывы из Instagram</p>

        <div class="reviews__grid" id="reviewsGrid">
          <!-- Generated by script.js -->
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer__inner">
      <img src="" alt="ВСЕМ ЕДУ" class="footer__logo" id="footerLogo">
      <p class="footer__text" id="footerCopyright"></p>
      <a href="" target="_blank" id="footerInstagramLink" style="color: #ffffff; font-size: 26px; margin-right: 15px; text-decoration: none; display: inline-block; vertical-align: middle;">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="tel:" class="footer__phone" id="footerPhoneLink"></a>
    </div>
  </footer>

  <!-- Image Modal -->
  <div class="modal" id="imageModal" role="dialog" aria-modal="true" aria-label="Изображение меню" hidden>
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__content">
      <button class="modal__close" id="modalClose" type="button" aria-label="Закрыть">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <img src="" alt="" class="modal__img" id="modalImage">
    </div>
  </div>

  <!-- Fixed WhatsApp Button -->
  <a
    href=""
    class="whatsapp-btn"
    id="whatsappBtn"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Заказать через WhatsApp"
  >
    <svg class="whatsapp-btn__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.881 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    <span id="whatsappBtnText">Заказать через WhatsApp</span>
  </a>

  <script src="script.js"></script>
</body>
</html>
